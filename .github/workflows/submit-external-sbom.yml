name: Submit external SBOM dependencies

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  submit-external-sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Aca simulamos la descarga del SBOM desde JFROG/NEXUS.
      - name: Simulate SBOM download from JFrog or Nexus
        run: |
          cp external-dependencies-simulated.cdx.json downloaded-sbom.cdx.json
          cat downloaded-sbom.cdx.json

      - name: Convert CycloneDX SBOM to GitHub dependency snapshot
        run: |
          python scripts/cdx_to_github_snapshot.py \
            --input downloaded-sbom.cdx.json \
            --output snapshot.json \
            --source-location external/jfrog-or-nexus/downloaded-sbom.cdx.json

      - name: Show generated snapshot
        run: cat snapshot.json

      - name: Submit snapshot to GitHub Dependency Submission API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/dependency-graph/snapshots" \
            -d @snapshot.json)

          echo "GitHub API HTTP status: ${HTTP_CODE}"
          cat response.json

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Dependency submission failed."
            exit 1
          fi
